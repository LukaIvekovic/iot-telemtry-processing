server:
  port: 8082

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iot_telemetry}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  client-id: alerting-service
  topic: "telemetry/#"
  qos: 1
  username: ""
  password: ""

deduplication:
  ttl-seconds: 3600

alerting:
  webhook-url: ${ALERTING_WEBHOOK_URL:http://localhost:9000/alert}
  rules:
    - sensor: temperature
      min: 0.0
      max: 35.0
    - sensor: humidity
      min: 20.0
      max: 80.0
    - sensor: pressure
      min: 950.0
      max: 1050.0
